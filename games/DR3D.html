<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Death Run 3D</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.ico">
</head>
<body>

<a href="../index.html" class="backBtn">← Back</a>

<iframe
  id="gameFrame"
  src="https://script.google.com/macros/s/AKfycbwqW4kBl41CHKxAW1aOCzUllnCGaK6LDmkZfAZH_dJzu646nns5bRfn0oqa5Zpq9zEI/exec"
  style="width:1000px;height:600px;border:none;"
  frameborder="0"
  scrolling="no"
></iframe>

<button id="fullscreenBtn">Go Fullscreen</button>

<script>
  document.getElementById("fullscreenBtn").addEventListener("click", function() {
    var src = "https://script.google.com/macros/s/AKfycbwqW4kBl41CHKxAW1aOCzUllnCGaK6LDmkZfAZH_dJzu646nns5bRfn0oqa5Zpq9zEI/exec";
    var html = "<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#000;overflow:hidden}iframe{display:block;width:100%;height:100%;border:none}<\/style><\/head><body><iframe src=\"" + src + "\" frameborder=\"0\" scrolling=\"no\"><\/iframe><\/body><\/html>";
    var blob = new Blob([html], { type: "text/html" });
    var url = URL.createObjectURL(blob);
    window.open(url, "_blank");
  });
</script>

</body>
</html>
