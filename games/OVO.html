<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OvO</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<a href="../index.html" class="backBtn">← Back</a>

<iframe width="1366" height="768" src="https://ovoclassic-pro.github.io/file/" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

<button id="fullscreenBtn">Go Fullscreen</button>

<script>
  const iframe = document.querySelector('iframe');
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (iframe.requestFullscreen) {
      iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
      iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
      iframe.msRequestFullscreen();
    }
  });
</script>

</body>
</html>
