<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pokemon Emerald</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.ico">
</head>
<body>

<a href="../index.html" class="backBtn">← Back</a>

<iframe id="iframe1" src="https://bobzgames.github.io/GBA/launcher.html#pokemonemerald" scrolling="no" style="width:1280px; height:720px; overflow:hidden; margin:auto; display:block; border:none;"></iframe>

<button id="fullscreenBtn">Go Fullscreen</button>

<script>
  const iframe = document.querySelector('iframe');
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (iframe.requestFullscreen) {
      iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
      iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
      iframe.msRequestFullscreen();
    }
  });
</script>

<div>

  <a>
    Note:
    <div></div>
    Yall can press Enter to skip startup!
    <div></div>
    Press X to confirm, Z to go back.
  </a>

</div>

</body>
</html>
