<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Only Up [Multiplayer]</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.ico">
</head>
<body>

<a href="../index.html" class="backBtn">← Back</a>

<iframe id="iframe1" src="https://www.spatial.io/embed/Mostly-Only-Up-64f8d2297af3f1ab8a72737d?embedSource=nowgg&share=5254322731821968762" scrolling="no" style="width:1280px; height:720px; overflow:hidden; margin:auto; display:block; border:none;"></iframe>

<button id="fullscreenBtn">Go Fullscreen</button>

<script>
  const iframe = document.querySelector('iframe');
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (iframe.requestFullscreen) {
      iframe.requestFullscreen();
    } else if (iframe.webkitRequestFullscreen) {
      iframe.webkitRequestFullscreen();
    } else if (iframe.msRequestFullscreen) {
      iframe.msRequestFullscreen();
    }
  });
</script>

</body>
</html>
